<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- 角丸背景 -->
  <rect width="256" height="256" rx="56" fill="url(#bg)"/>
  <!-- 時計フェイス（小サイズでも判別しやすい太めの線） -->
  <circle cx="128" cy="128" r="78" fill="none" stroke="#ffffff" stroke-width="18"/>
  <!-- 時針 (10時方向) -->
  <line x1="128" y1="128" x2="128" y2="78" stroke="#ffffff" stroke-width="16" stroke-linecap="round"/>
  <!-- 分針 (2時方向) -->
  <line x1="128" y1="128" x2="168" y2="151" stroke="#ffffff" stroke-width="12" stroke-linecap="round"/>
  <!-- 中心点 -->
  <circle cx="128" cy="128" r="12" fill="#ffffff"/>
</svg>
